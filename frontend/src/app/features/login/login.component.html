<div class="login-container">
  <div class="login-card">
    <div class="logo">🎓</div>
    <h1>AI Teacher</h1>
    <p class="subtitle">Your personal AI-powered learning adventure</p>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" [ngModel]="displayName()" (ngModelChange)="displayName.set($event)"
        placeholder="Enter your display name" [disabled]="loading()" />
    </div>

    <div class="form-group">
      <label>6-Digit PIN</label>
      <input type="password" [ngModel]="pin()" (ngModelChange)="pin.set($event)"
        placeholder="••••••" maxlength="6" [disabled]="loading()" (keyup.enter)="login()" />
    </div>

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <button class="btn-primary" (click)="login()" [disabled]="loading()">
      {{ loading() ? 'Logging in...' : 'Start Learning →' }}
    </button>
  </div>
</div>
