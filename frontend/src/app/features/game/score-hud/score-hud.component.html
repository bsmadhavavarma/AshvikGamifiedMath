<div class="score-hud">
  <!-- Coins -->
  <div class="hud-item">
    <app-coin-counter [coins]="gameStore.coinsThisSession()"></app-coin-counter>
  </div>

  <!-- Streak -->
  <div class="hud-item streak-display" [class.streak-active]="gameStore.currentStreak() > 0">
    <span class="streak-icon">🔥</span>
    <span class="streak-count">{{ gameStore.currentStreak() }}</span>
    <span class="streak-label">Streak</span>
  </div>

  <!-- Question Progress -->
  <div class="hud-item progress-display">
    <span class="progress-text">
      Q{{ gameStore.sequenceNumber() }}/{{ gameStore.totalQuestions() }}
    </span>
    <div class="progress-dots">
      @for (i of [].constructor(gameStore.totalQuestions()); track $index) {
        <span
          class="progress-dot"
          [class.answered]="$index < gameStore.sequenceNumber() - 1"
          [class.current]="$index === gameStore.sequenceNumber() - 1"
        ></span>
      }
    </div>
  </div>

  <!-- Accuracy -->
  <div class="hud-item accuracy-display">
    <span class="accuracy-icon">🎯</span>
    <span class="accuracy-value">{{ gameStore.accuracy() }}%</span>
  </div>
</div>
