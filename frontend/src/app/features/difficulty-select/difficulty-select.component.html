<div class="difficulty-page">
  <div class="difficulty-container">
    <div class="page-header">
      <h1 class="page-title">Choose Your Level</h1>
      <p class="page-subtitle">
        Hey {{ player()?.avatarCode }} {{ player()?.displayName }}! Ready to practice?
      </p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">
        ⚠️ {{ errorMessage() }}
      </div>
    }

    <div class="difficulty-cards">
      @for (diff of difficulties; track diff.level) {
        <button
          class="difficulty-card"
          [class]="'difficulty-card--' + diff.color"
          [class.loading]="isLoading() === diff.level"
          (click)="selectDifficulty(diff.level)"
          [disabled]="isLoading() !== null"
          type="button"
        >
          <div class="card-header">
            <span class="card-icon">{{ diff.icon }}</span>
            <div class="card-titles">
              <h2 class="card-title">{{ diff.title }}</h2>
              <span class="card-badge">{{ diff.subtitle }}</span>
            </div>
          </div>

          <p class="card-description">{{ diff.description }}</p>

          <ul class="topic-list">
            @for (topic of diff.topics; track topic) {
              <li class="topic-item">
                <span class="topic-check">✓</span>
                {{ topic }}
              </li>
            }
          </ul>

          <div class="card-cta">
            @if (isLoading() === diff.level) {
              <span class="loading-text">⏳ Starting game...</span>
            } @else {
              <span class="cta-text">
                Play {{ diff.title }} →
              </span>
            }
          </div>
        </button>
      }
    </div>

    <div class="game-info">
      <div class="info-item">
        <span class="info-icon">❓</span>
        <span class="info-text">10 Questions per session</span>
      </div>
      <div class="info-item">
        <span class="info-icon">⏱️</span>
        <span class="info-text">15 seconds per question</span>
      </div>
      <div class="info-item">
        <span class="info-icon">🪙</span>
        <span class="info-text">Earn coins for correct answers</span>
      </div>
    </div>
  </div>
</div>
